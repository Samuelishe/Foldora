<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Foldora icon</title>
  <desc id="desc">A self-authored folded blue/cyan folder mark with a broad light-cyan folded plane on a dark rounded app tile.</desc>
  <defs>
    <linearGradient id="tile" x1="33" y1="26" x2="223" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#243B74"/>
      <stop offset="0.58" stop-color="#0B224C"/>
      <stop offset="1" stop-color="#07152F"/>
    </linearGradient>
    <linearGradient id="tab" x1="71" y1="66" x2="202" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#63F7F4"/>
      <stop offset="0.55" stop-color="#18C7D5"/>
      <stop offset="1" stop-color="#188EF8"/>
    </linearGradient>
    <linearGradient id="face" x1="72" y1="104" x2="208" y2="201" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#109CFF"/>
      <stop offset="0.56" stop-color="#166EF8"/>
      <stop offset="1" stop-color="#8446F2"/>
    </linearGradient>
    <linearGradient id="fold" x1="55" y1="78" x2="111" y2="197" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F1FFFF"/>
      <stop offset="0.46" stop-color="#91F0FF"/>
      <stop offset="1" stop-color="#27A2FF"/>
    </linearGradient>
    <linearGradient id="foldShade" x1="72" y1="151" x2="120" y2="203" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A4CB0"/>
      <stop offset="1" stop-color="#237EFF"/>
    </linearGradient>
    <filter id="folderShadow" x="-12%" y="-18%" width="128%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#020713" flood-opacity="0.44"/>
    </filter>
    <filter id="softLift" x="-18%" y="-18%" width="136%" height="148%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#020713" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect x="22" y="22" width="212" height="212" rx="48" fill="url(#tile)"/>
  <rect x="26" y="26" width="204" height="204" rx="44" fill="none" stroke="#2D477E" stroke-opacity="0.42" stroke-width="2"/>

  <g filter="url(#folderShadow)">
    <path d="M67 82C67 74.8 72.8 69 80 69H108C121.6 69 127.8 86.4 139.2 91.6C142.6 93.1 146.6 94 151.5 94H193C207.4 94 219 105.6 219 120V138H55V94C55 87.4 60.4 82 67 82Z" fill="url(#tab)"/>
    <rect x="57" y="104" width="162" height="96" rx="19" fill="url(#face)"/>
  </g>

  <path d="M67 108H202C209.2 108 215.4 112.6 217.6 119.4C214.6 110.5 205.6 104 194.8 104H80C70.4 104 61.9 109.3 58.7 117.5C61 111.4 63.7 108 67 108Z" fill="#8BF8FF" opacity="0.54"/>
  <path d="M74 154L129 200H82C68.2 200 57.2 190.8 55.1 177.8L74 154Z" fill="url(#foldShade)" opacity="0.86"/>

  <g filter="url(#softLift)">
    <path d="M75 74C58.7 77.8 49 91 49 106V168C49 184.4 57 197.7 70 205L111 168C121.2 158.8 121.3 148.3 111.5 138.8L75 74Z" fill="url(#fold)"/>
    <path d="M75 78L112.3 140.4C120.1 148.6 120.2 157.9 112 166.2L68.7 204.2C57.2 196.6 50.8 184 50.8 168V106C50.8 92.9 58.7 81.9 75 78Z" fill="none" stroke="#F7FFFF" stroke-opacity="0.5" stroke-width="2.2" stroke-linejoin="round"/>
  </g>

  <path d="M75 78L110.8 138.4C116.4 147.8 116 156 109.5 163.5L61 105.5C53.8 96.8 58 82.2 75 78Z" fill="#F7FFFF" opacity="0.34"/>
  <path d="M111 168L70 205C57 197.7 49 184.4 49 168V164.5C56.4 177.2 69.8 183 84.1 181.4L111 168Z" fill="#0875E8" opacity="0.28"/>
  <rect x="57" y="104" width="162" height="96" rx="19" fill="none" stroke="#78F1FF" stroke-opacity="0.33" stroke-width="2"/>
</svg>
